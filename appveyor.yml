# DO NOT CHANGE the "init" and "install" sections below

# Download script file from GitHub
init:
  ps: |
        $ErrorActionPreference = "Stop"
        Invoke-WebRequest http://raw.github.com/krlmlr/r-appveyor/master/scripts/appveyor-tool.ps1 -OutFile "..\appveyor-tool.ps1"
        Import-Module '..\appveyor-tool.ps1'

install:
  ps: Bootstrap

# Adapt as necessary starting from here

environment:
  USE_RTOOLS: true
  WARNINGS_ARE_ERRORS: true
  _R_CHECK_FORCE_SUGGESTS_: false
  _R_CHECK_CRAN_INCOMING_: false

build_script:
  # Show R/session information for debugging
  - Rscript -e "sessionInfo()"

  # Use a reliable CRAN mirror and increase timeout
  - Rscript -e "options(timeout = 600); options(repos = c(CRAN = 'https://cloud.r-project.org')); print(getOption('repos'))"

  # Install CRAN-side build/check helpers
  - Rscript -e "options(timeout = 600); options(repos = c(CRAN = 'https://cloud.r-project.org')); install.packages(c('remotes', 'rcmdcheck'), dependencies = TRUE)"

  # Install Bioconductor dependencies directly, without BiocManager version validation.
  # This avoids SSL/config.yaml failures on AppVeyor.
  - Rscript -e "options(timeout = 600); repos <- c(BioCsoft = 'https://bioconductor.org/packages/release/bioc', BioCann = 'https://bioconductor.org/packages/release/data/annotation', BioCexp = 'https://bioconductor.org/packages/release/data/experiment', CRAN = 'https://cloud.r-project.org'); install.packages(c('limma', 'edgeR'), repos = repos, dependencies = TRUE)"

  # Install all remaining package dependencies using both CRAN and Bioconductor repositories
  - Rscript -e "options(timeout = 600); repos <- c(BioCsoft = 'https://bioconductor.org/packages/release/bioc', BioCann = 'https://bioconductor.org/packages/release/data/annotation', BioCexp = 'https://bioconductor.org/packages/release/data/experiment', CRAN = 'https://cloud.r-project.org'); options(repos = repos); remotes::install_deps(dependencies = TRUE, upgrade = 'never')"

test_script:
  # Run CRAN-like check
  - Rscript -e "options(timeout = 600); repos <- c(BioCsoft = 'https://bioconductor.org/packages/release/bioc', BioCann = 'https://bioconductor.org/packages/release/data/annotation', BioCexp = 'https://bioconductor.org/packages/release/data/experiment', CRAN = 'https://cloud.r-project.org'); options(repos = repos); rcmdcheck::rcmdcheck(args = c('--no-manual', '--as-cran'), error_on = 'warning')"

on_failure:
  - 7z a failure.zip *.Rcheck\*
  - appveyor PushArtifact failure.zip

artifacts:
  - path: '*.Rcheck\**\*.log'
    name: Logs

  - path: '*.Rcheck\**\*.out'
    name: Logs

  - path: '*.Rcheck\**\*.fail'
    name: Logs

  - path: '*.Rcheck\**\*.Rout'
    name: Logs

  - path: '\*_*.tar.gz'
    name: Bits

  - path: '\*_*.zip'
    name: Bits