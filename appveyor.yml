image: Visual Studio 2022

# DO NOT CHANGE the "init" and "install" sections below

# Download script file from GitHub
init:
  ps: |
        $ErrorActionPreference = "Stop"
        Invoke-WebRequest http://raw.github.com/krlmlr/r-appveyor/master/scripts/appveyor-tool.ps1 -OutFile "..\appveyor-tool.ps1"
        Import-Module '..\appveyor-tool.ps1'

install:
  ps: Bootstrap

# Adapt as necessary starting from here

environment:
  global:
    USE_RTOOLS: true
    WARNINGS_ARE_ERRORS: true
    _R_CHECK_FORCE_SUGGESTS_: false
    _R_CHECK_CRAN_INCOMING_: false

  matrix:
    - R_VERSION: oldrel

build_script:
  # Show R/session information
  - Rscript -e "sessionInfo()"

  # Install Rtools45 because R 4.5.x requires the Rtools45 toolchain.
  # The old r-appveyor bootstrap installs Rtools40, which is not compatible with R 4.5.
  - ps: choco install rtools -y --no-progress

  # Put Rtools45 first in PATH so it overrides Rtools40 added by r-appveyor.
  - set PATH=C:\rtools45\x86_64-w64-mingw32.static.posix\bin;C:\rtools45\usr\bin;%PATH%

  # Confirm compiler/toolchain
  - where gcc
  - gcc --version

  # Check build tools, but do not stop the build here if pkgbuild is noisy
  - Rscript -e "options(timeout = 600); install.packages('pkgbuild', repos = 'https://cloud.r-project.org'); pkgbuild::check_build_tools(debug = TRUE)" || ver

  # Use reliable CRAN and Bioconductor repositories
  - Rscript -e "options(timeout = 600); options(repos = c(CRAN = 'https://cloud.r-project.org')); print(getOption('repos'))"

  # Install build/check helpers and vignette builders
  - Rscript -e "options(timeout = 600); install.packages(c('remotes', 'rcmdcheck', 'knitr', 'rmarkdown'), repos = 'https://cloud.r-project.org', dependencies = c('Depends', 'Imports', 'LinkingTo'))"

  # Install Bioconductor dependency directly, without BiocManager version validation.
  # Use required dependencies only; dependencies=TRUE would install many optional Bioconductor packages.
  - Rscript -e "options(timeout = 600); repos <- c(BioCsoft = 'https://bioconductor.org/packages/release/bioc', BioCann = 'https://bioconductor.org/packages/release/data/annotation', BioCexp = 'https://bioconductor.org/packages/release/data/experiment', CRAN = 'https://cloud.r-project.org'); install.packages(c('limma', 'edgeR'), repos = repos, dependencies = c('Depends', 'Imports', 'LinkingTo'))"

  # Install remaining required package dependencies only
  - Rscript -e "options(timeout = 600); repos <- c(BioCsoft = 'https://bioconductor.org/packages/release/bioc', BioCann = 'https://bioconductor.org/packages/release/data/annotation', BioCexp = 'https://bioconductor.org/packages/release/data/experiment', CRAN = 'https://cloud.r-project.org'); options(repos = repos); remotes::install_deps(dependencies = c('Depends', 'Imports', 'LinkingTo'), upgrade = 'never')"

test_script:
  # Ensure Rtools45 is still first in PATH during check
  - set PATH=C:\rtools45\x86_64-w64-mingw32.static.posix\bin;C:\rtools45\usr\bin;%PATH%

  # Run CRAN-like check
  - Rscript -e "options(timeout = 600); repos <- c(BioCsoft = 'https://bioconductor.org/packages/release/bioc', BioCann = 'https://bioconductor.org/packages/release/data/annotation', BioCexp = 'https://bioconductor.org/packages/release/data/experiment', CRAN = 'https://cloud.r-project.org'); options(repos = repos); rcmdcheck::rcmdcheck(args = c('--no-manual', '--as-cran'), error_on = 'warning')"

on_failure:
  - 7z a failure.zip *.Rcheck\*
  - appveyor PushArtifact failure.zip

artifacts:
  - path: '*.Rcheck\**\*.log'
    name: Logs

  - path: '*.Rcheck\**\*.out'
    name: Logs

  - path: '*.Rcheck\**\*.fail'
    name: Logs

  - path: '*.Rcheck\**\*.Rout'
    name: Logs

  - path: '\*_*.tar.gz'
    name: Bits

  - path: '\*_*.zip'
    name: Bits